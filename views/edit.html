<h1>Edit Carton</h1>
<form id="edit-form">
  <div class="form-row-2">
    <div class="form-group">
      <label for="brand">Brand</label>
      <input type="text" id="brand" name="brand" value="{{CARTON_BRAND}}">
    </div>
    <div class="form-group">
      <label for="carton_id">Carton ID</label>
      <input type="text" id="carton_id" name="carton_id" value="{{CARTON_CARTON_ID}}">
    </div>
  </div>
  <fieldset>
    <legend>Dimensions (inches)</legend>
    <div class="form-row">
      <div class="form-group">
        <label for="length">Length <span class="required">*</span></label>
        <input type="number" id="length" name="length" min="0.1" step="0.1" value="{{CARTON_LENGTH}}" required>
      </div>
      <div class="form-group">
        <label for="width">Width <span class="required">*</span></label>
        <input type="number" id="width" name="width" min="0.1" step="0.1" value="{{CARTON_WIDTH}}" required>
      </div>
      <div class="form-group">
        <label for="height">Height <span class="required">*</span></label>
        <input type="number" id="height" name="height" min="0.1" step="0.1" value="{{CARTON_HEIGHT}}" required>
      </div>
    </div>
  </fieldset>
  <div class="form-group">
    <label for="color">Color</label>
    <input type="text" id="color" name="color" value="{{CARTON_COLOR}}">
  </div>
  <div class="form-row-2">
    <div class="form-group">
      <label for="condition">Condition <span class="required">*</span></label>
      <select id="condition" name="condition" required>
        <option value="new" {{CARTON_CONDITION_NEW}}>New</option>
        <option value="good" {{CARTON_CONDITION_GOOD}}>Good</option>
        <option value="fair" {{CARTON_CONDITION_FAIR}}>Fair</option>
        <option value="poor" {{CARTON_CONDITION_POOR}}>Poor</option>
      </select>
    </div>
    <div class="form-group">
      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" name="quantity" min="0" step="1" value="{{CARTON_QUANTITY}}">
    </div>
  </div>
  <div class="form-group">
    <label for="location">Location</label>
    <input type="text" id="location" name="location" value="{{CARTON_LOCATION}}">
  </div>
  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="3">{{CARTON_NOTES}}</textarea>
  </div>
  <div class="form-group">
    <label for="label_id">Label ID <span class="required">*</span></label>
    <input type="text" id="label_id" name="label_id" value="{{CARTON_LABEL_ID}}" required>
  </div>
  <div id="error-msg" class="error-msg"></div>
  <div class="form-actions">
    <a href="/" class="btn-secondary">Cancel</a>
    <button type="submit" class="btn-primary">Update Carton</button>
  </div>
</form>
<script>
  const cartonId = {{CARTON_ID}}

  function fmtDim(n) {
    const v = parseFloat(n)
    return v % 1 === 0 ? String(Math.round(v)) : String(v)
  }

  function generateLabel() {
    const brand     = document.getElementById('brand').value.trim()
    const carton_id = document.getElementById('carton_id').value.trim()
    const length    = document.getElementById('length').value
    const width     = document.getElementById('width').value
    const height    = document.getElementById('height').value
    const parts = []
    if (length && width && height) parts.push(`${fmtDim(length)}x${fmtDim(width)}x${fmtDim(height)}`)
    if (brand)     parts.push(brand.toUpperCase())
    if (carton_id) parts.push(carton_id.toUpperCase())
    document.getElementById('label_id').value = parts.join('-')
  }

  ;['brand', 'carton_id', 'length', 'width', 'height'].forEach(id => {
    document.getElementById(id).addEventListener('input', generateLabel)
  })

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault()
    const errorEl = document.getElementById('error-msg')
    errorEl.textContent = ''
    const body = {
      label_id:  document.getElementById('label_id').value,
      carton_id: document.getElementById('carton_id').value,
      brand:     document.getElementById('brand').value,
      color:     document.getElementById('color').value,
      length:    parseFloat(document.getElementById('length').value),
      width:     parseFloat(document.getElementById('width').value),
      height:    parseFloat(document.getElementById('height').value),
      condition: document.getElementById('condition').value,
      quantity:  parseInt(document.getElementById('quantity').value, 10),
      location:  document.getElementById('location').value,
      notes:     document.getElementById('notes').value,
    }
    const res = await fetch(`/api/cartons/${cartonId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (res.ok) {
      window.location.href = '/'
    } else {
      const data = await res.json()
      errorEl.textContent = data.error || 'An error occurred'
    }
  })
</script>
