<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    {{ERROR_MSG}}
    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" minlength="3" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="8" required>
      </div>
      <button type="submit" class="btn-primary btn-block">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
