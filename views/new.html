<h1>Add Carton</h1>
<form id="new-form">
  <div class="form-group">
    <label for="label">Label <span class="required">*</span></label>
    <input type="text" id="label" name="label" required>
  </div>
  <div class="form-group">
    <label for="company">Company</label>
    <input type="text" id="company" name="company">
  </div>
  <fieldset>
    <legend>Dimensions (inches)</legend>
    <div class="form-row">
      <div class="form-group">
        <label for="length">Length <span class="required">*</span></label>
        <input type="number" id="length" name="length" min="0.1" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="width">Width <span class="required">*</span></label>
        <input type="number" id="width" name="width" min="0.1" step="0.1" required>
      </div>
      <div class="form-group">
        <label for="height">Height <span class="required">*</span></label>
        <input type="number" id="height" name="height" min="0.1" step="0.1" required>
      </div>
    </div>
  </fieldset>
  <div class="form-group">
    <label for="condition">Condition <span class="required">*</span></label>
    <select id="condition" name="condition" required>
      <option value="">Select…</option>
      <option value="new">New</option>
      <option value="good">Good</option>
      <option value="fair">Fair</option>
      <option value="poor">Poor</option>
    </select>
  </div>
  <div class="form-group">
    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" name="quantity" min="0" step="1" value="1">
  </div>
  <div id="error-msg" class="error-msg"></div>
  <div class="form-actions">
    <a href="/" class="btn-secondary">Cancel</a>
    <button type="submit" class="btn-primary">Save Carton</button>
  </div>
</form>
<script>
  document.getElementById('new-form').addEventListener('submit', async function(e) {
    e.preventDefault()
    const errorEl = document.getElementById('error-msg')
    errorEl.textContent = ''
    const body = {
      label: document.getElementById('label').value,
      company: document.getElementById('company').value,
      length: parseFloat(document.getElementById('length').value),
      width: parseFloat(document.getElementById('width').value),
      height: parseFloat(document.getElementById('height').value),
      condition: document.getElementById('condition').value,
      quantity: parseInt(document.getElementById('quantity').value, 10),
    }
    const res = await fetch('/api/cartons', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (res.ok) {
      window.location.href = '/'
    } else {
      const data = await res.json()
      errorEl.textContent = data.error || 'An error occurred'
    }
  })
</script>
