<h1>Inventory</h1>
<table>
  <thead>
    <tr>
      <th>Label</th>
      <th>Company</th>
      <th>Size (L×W×H)</th>
      <th>Condition</th>
      <th>Qty</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="carton-tbody">
    {{CARTON_ROWS}}
  </tbody>
</table>
<script>
  async function deleteCarton(id, row) {
    if (!confirm('Delete this carton?')) return
    const res = await fetch(`/api/cartons/${id}`, { method: 'DELETE' })
    if (res.ok) {
      row.remove()
    } else {
      const data = await res.json()
      alert(data.error || 'Delete failed')
    }
  }

  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', function() {
      deleteCarton(this.dataset.id, this.closest('tr'))
    })
  })
</script>
