<div class="page-header">
  <h1>Find a Carton</h1>
</div>
<form method="GET" action="/cartons/find">
  <fieldset>
    <legend>Item Dimensions (inches)</legend>
    <div class="form-row">
      <div class="form-group">
        <label for="length">Length <span class="required">*</span></label>
        <input type="number" id="length" name="length" min="0.1" step="0.1" value="{{FIND_LENGTH}}" required>
      </div>
      <div class="form-group">
        <label for="width">Width <span class="required">*</span></label>
        <input type="number" id="width" name="width" min="0.1" step="0.1" value="{{FIND_WIDTH}}" required>
      </div>
      <div class="form-group">
        <label for="height">Height <span class="required">*</span></label>
        <input type="number" id="height" name="height" min="0.1" step="0.1" value="{{FIND_HEIGHT}}" required>
      </div>
    </div>
  </fieldset>
  <div class="form-actions">
    <a href="/" class="btn-secondary">Cancel</a>
    <button type="submit" class="btn-primary">Find Matching Cartons</button>
  </div>
</form>
{{FIND_RESULTS}}
